<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空席カレンダー｜洋食だいにんぐなかむら</title>
<style>
  :root{
    --ink:#33312d; --sub:#6b665c; --bg:#d6d6d4; --cell:#ffffff; --line:#b9b4a8;
    --sun:#b0413e; --sat:#3b5b92;
    --lunch:#f2c94c; --lunch-tx:#5d4a0e; --dinner:#2d4f9e; --full:#b7b2a7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:linear-gradient(160deg,#dcdcda,#d3d3d1 55%,#d8d7d3);
    color:var(--ink); min-height:100vh; padding:20px 14px 40px;
  }
  .wrap{max-width:520px; margin:0 auto;}
  h1{
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
    font-size:26px; letter-spacing:.2em; text-align:center; font-weight:600;
  }
  .period{
    font-family:"Yu Mincho",serif; text-align:center; color:var(--sub);
    font-size:14px; letter-spacing:.1em; margin-top:6px;
  }
  .legend{
    background:rgba(255,255,255,.92); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; margin:14px 0 16px;
    font-size:12px; line-height:1.9; text-align:center;
  }
  .chip{display:inline-block; width:34px; height:15px; border-radius:4px; vertical-align:-2px;}
  .chip.l{background:var(--lunch);} .chip.d{background:var(--dinner);}
  .chip.f{background:var(--full); width:auto; color:#fff; font-size:10px; padding:1px 7px; height:auto; border-radius:4px;}
  .day{
    background:var(--cell); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
  }
  .date{
    flex:none; width:84px; text-align:center;
    font-family:"Yu Mincho",Georgia,serif;
  }
  .date .md{font-size:22px; font-weight:700;}
  .date .wd{font-size:12px; color:var(--sub);}
  .date.sun .md,.date.sun .wd{color:var(--sun);}
  .date.sat .md,.date.sat .wd{color:var(--sat);}
  .bars{flex:1; display:flex; flex-direction:column; gap:7px;}
  .bar{
    display:flex; align-items:center; border-radius:9px;
    padding:9px 14px; font-size:15px; letter-spacing:.06em;
  }
  .bar .svc{font-weight:700; width:64px; flex:none;}
  .bar .mark{flex:1; text-align:center; font-size:22px; font-weight:700; font-family:Georgia,serif;}
  .bar .mark.fullword{font-size:16px; font-family:"Yu Mincho",serif; letter-spacing:.2em;}
  .bar.l{background:var(--lunch); color:var(--lunch-tx);}
  .bar.d{background:var(--dinner); color:#fff;}
  .bar.full{background:var(--full); color:#fff;}
  .closed{
    flex:1; text-align:center; color:var(--sub);
    font-family:"Yu Mincho",serif; font-size:16px; letter-spacing:.3em; padding:12px 0;
  }
  .closed::before,.closed::after{content:"✕"; margin:0 10px; font-size:14px;}
  .note{
    text-align:center; font-size:12px; color:var(--sub); line-height:1.9; margin-top:14px;
  }
  .reserve{
    display:block; text-align:center; text-decoration:none;
    background:#33312d; color:#f3efe6; font-family:"Yu Mincho",serif;
    font-size:17px; letter-spacing:.25em; padding:16px; border-radius:12px;
    margin-top:18px;
  }
  #status{text-align:center; color:var(--sub); font-size:13px; padding:40px 0; line-height:2;}
</style>
</head>
<body>
<div class="wrap">
  <h1>空席カレンダー</h1>
  <div class="period" id="period"></div>

  <div class="legend">
    <span class="chip l"></span> 昼（ランチ）　<span class="chip d"></span> 夜（ディナー）<br>
    ○ 空席あり　△ 残りわずか　<span class="chip f">満席</span>　✕ 休み
  </div>

  <div id="status">読み込み中…</div>
  <div id="days"></div>

  <div class="note">
    最新のご予約状況をもとに表示しています。<br>
    △・満席の日も、お電話でご相談いただける場合があります。
  </div>
  <a class="reserve" id="reserveBtn" style="display:none;">ご予約はこちら</a>
</div>

<script>
/* ★ここにGASのウェブアプリURLを貼ってください（管理アプリと同じもの）★ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbz0iY5thP06nRqA6YZ3Koa2QVHW9jywO_-Di9r4CiaIJaxs4gXXCEKkG2uAcM8JTX1g/exec";

const WD=["日","月","火","水","木","金","土"];
const DEFAULTS={lOk:12,lFew:21,dOk:12,dFew:21};

function pad(n){return String(n).padStart(2,"0");}
function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function parseYmd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}

function statusOf(kind,pax,st){
  const ok = kind==="l" ? (st.lOk??DEFAULTS.lOk) : (st.dOk??DEFAULTS.dOk);
  const few= kind==="l" ? (st.lFew??DEFAULTS.lFew): (st.dFew??DEFAULTS.dFew);
  if(pax<=ok) return "ok"; if(pax<=few) return "few"; return "full";
}

function render(st){
  const statusEl=document.getElementById("status");
  if(!st || !st.startDate){ statusEl.textContent="ただいま準備中です。\nお電話でお問い合わせください。"; return; }
  statusEl.style.display="none";

  const start=parseYmd(st.startDate);
  const today=parseYmd(ymd(new Date()));
  const daysEl=document.getElementById("days");
  let firstShown=null,lastShown=null;

  for(let i=0;i<14;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    if(d<today) continue;                      // 過ぎた日は出さない
    const ds=ymd(d);
    const day=(st.days&&st.days[ds])||{mode:"closed",lunch:0,dinner:0};
    if(!firstShown)firstShown=d; lastShown=d;

    const wd=d.getDay();
    const card=document.createElement("div"); card.className="day";
    const dt=document.createElement("div");
    dt.className="date"+(wd===0?" sun":wd===6?" sat":"");
    dt.innerHTML='<div class="md">'+(d.getMonth()+1)+"/"+d.getDate()+'</div><div class="wd">（'+WD[wd]+'）</div>';
    card.appendChild(dt);

    if(day.mode==="closed"){
      const c=document.createElement("div"); c.className="closed"; c.textContent="お休み";
      card.appendChild(c);
    }else{
      const bars=document.createElement("div"); bars.className="bars";
      if(day.mode==="both") bars.appendChild(bar("l","昼",day.lunch,st));
      bars.appendChild(bar("d","夜",day.dinner,st));
      card.appendChild(bars);
    }
    daysEl.appendChild(card);
  }

  if(firstShown){
    document.getElementById("period").textContent=
      firstShown.getFullYear()+"."+(firstShown.getMonth()+1)+"."+firstShown.getDate()
      +"（"+WD[firstShown.getDay()]+"）〜 "
      +(lastShown.getMonth()+1)+"."+lastShown.getDate()+"（"+WD[lastShown.getDay()]+"）";
  }else{
    statusEl.style.display="block";
    statusEl.textContent="ただいま次の期間を準備中です。\nお電話でお問い合わせください。";
  }

  if(st.reserveUrl){
    const b=document.getElementById("reserveBtn");
    b.href=st.reserveUrl; b.style.display="block";
  }
}

function bar(kind,label,pax,st){
  const s=statusOf(kind,pax,st);
  const el=document.createElement("div");
  el.className="bar "+(s==="full"?"full":kind);
  const mark = s==="ok"?"○" : s==="few"?"△" : "満席";
  el.innerHTML='<span class="svc">'+label+'</span>'
    +'<span class="mark'+(s==="full"?' fullword':'')+'">'+mark+'</span>'
    +'<span style="width:64px;flex:none;"></span>';
  return el;
}

/* デモ表示（動作確認用）：URLの末尾に #demo を付けると見本データで表示 */
function demoData(){
  const t=new Date(); const days={};
  for(let i=0;i<14;i++){
    const d=new Date(t); d.setDate(t.getDate()+i); const ds=ymd(d);
    const wd=d.getDay();
    days[ds]= wd===1 ? {mode:"closed",lunch:0,dinner:0}
      : {mode:(wd===3||wd===4||wd===0)?"both":"dinner",
         lunch:[2,8,14][i%3], dinner:[6,15,23][i%3]};
  }
  return {startDate:ymd(t), days, reserveUrl:"tel:0828541299",
          lOk:12,lFew:21,dOk:12,dFew:21};
}

if(location.hash==="#demo"){
  render(demoData());
}else{
  fetch(GAS_URL+"?action=load")
    .then(r=>r.json())
    .then(j=>render(j&&j.data))
    .catch(()=>{ document.getElementById("status").textContent="読み込みに失敗しました。\n時間をおいてもう一度お試しください。"; });
}
</script>
</body>
</html>
