<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>食材マスター | Café照</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1c1612;--bg:#eae5dc;--cream:#f8f4ed;--card:#fff;
  --gd:#2a5c3f;--gm:#4a8c62;--gl:#c8e6d0;--gxl:#f0f9f3;
  --gold:#b8902a;--gold-l:#fdf0d0;
  --red:#c0392b;--border:#ddd5c2;--line:#e8e0d0;
  --mid:#7a6e5e;--light:#f5f0e8;--shadow:rgba(28,22,18,.10);
}
body{background:var(--bg);font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:0 0 calc(80px + env(safe-area-inset-bottom,10px))}
.top-bar{background:var(--gd);padding:16px 18px 13px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 20px rgba(42,92,63,.4)}
.top-shop{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.22em;font-family:"Shippori Mincho B1",serif;display:block;margin-bottom:2px}
.top-title{font-family:"Shippori Mincho B1",serif;font-size:19px;font-weight:800;color:#fff;letter-spacing:.05em;line-height:1}
.cloud-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:8px 14px;font-size:11px;cursor:pointer;letter-spacing:.1em;font-family:"Shippori Mincho B1",serif;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,.2)}
.tab-bar{background:var(--cream);border-bottom:2px solid var(--border);display:grid;grid-template-columns:1fr 1fr;position:sticky;top:57px;z-index:190}
.tab-btn{padding:12px 4px 10px;border:none;background:transparent;font-family:"Zen Kaku Gothic New",sans-serif;font-size:11px;font-weight:500;color:var(--mid);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.06em;touch-action:manipulation;-webkit-tap-highlight-color:rgba(42,92,63,.1);width:100%}
.tab-btn .ico{font-size:16px}
.tab-btn.on{color:var(--gd);border-bottom-color:var(--gd);font-weight:700}
.toolbar{background:var(--cream);border-bottom:1px solid var(--border);padding:10px 12px;position:sticky;top:103px;z-index:180}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-inp{flex:1;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--gm)}
.btn-add{height:42px;padding:0 16px;background:var(--gd);color:#fff;border:none;border-radius:10px;font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.06em;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,.2)}
.cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:11px;color:var(--mid);cursor:pointer;font-family:"Zen Kaku Gothic New",sans-serif;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:rgba(42,92,63,.1)}
.cat-btn.on{background:var(--gd);border-color:var(--gd);color:#fff;font-weight:700}
.count-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 4px;font-size:11px;color:var(--mid)}
.count-bar strong{font-family:"Shippori Mincho B1",serif;font-size:15px;color:var(--gd)}
.ing-card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px var(--shadow);margin:0 12px 8px;overflow:hidden}
.ic-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--line);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(42,92,63,.08);user-select:none;-webkit-user-select:none;min-height:52px}
.ic-name{font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;flex:1;margin-right:8px;line-height:1.3}
.ic-badges{display:flex;gap:5px;align-items:center;flex-shrink:0}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.bc-meat{background:#fff0e8;color:#8b3a15}
.bc-dairy{background:#f0ecfa;color:#5a3a8b}
.bc-season{background:#e8f5e9;color:#2a5c3f}
.bc-oil{background:#fffde7;color:#7a6a00}
.bc-pasta{background:#fce4ec;color:#880e4f}
.bc-veg{background:#e0f2f1;color:#00695c}
.bc-drink{background:#e8eaf6;color:#3949ab}
.bc-sake{background:#ede7f6;color:#512da8}
.bc-soy{background:#fff3e0;color:#e65100}
.bc-dispose{background:#efebe9;color:#4e342e}
.bc-other{background:var(--light);color:var(--mid)}
.bc-akt{background:#f3f8f3;color:#2a5c3f}
.tax-8{background:#e8f5e9;color:#2a5c3f;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.tax-10{background:#fff3e0;color:#e65100;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.chevron{font-size:14px;color:var(--mid);margin-left:4px;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.ic-price{display:flex;align-items:baseline;gap:3px;padding:8px 14px;background:var(--gxl)}
.price-val{font-family:"Shippori Mincho B1",serif;font-size:17px;font-weight:800;color:var(--gd)}
.price-unit{font-size:11px;color:var(--mid)}
.price-sup{font-size:11px;color:var(--mid);margin-left:auto}
.ic-expand{display:none}
.ic-expand.open{display:block}
.edit-form{background:var(--gxl);border-top:1px solid var(--gl);padding:12px 14px}
.ef-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ef-lbl{font-size:10px;font-weight:700;color:var(--mid);letter-spacing:.1em;min-width:52px;flex-shrink:0}
.ef-inp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none;min-height:40px}
.ef-inp:focus{border-color:var(--gm)}
.ef-btns{display:flex;gap:8px;margin-top:4px}
.btn-ef{flex:1;padding:12px;border:none;border-radius:9px;font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.08em;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:46px}
.btn-ef-green{background:var(--gd);color:#fff}
.btn-ef-red{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(248,244,237,.98);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px 12px env(safe-area-inset-bottom,10px);display:flex;gap:8px;z-index:300}
.btn-main{flex:2;padding:14px;border:none;border-radius:12px;font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.08em;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:50px}
.btn-m-green{background:var(--gd);color:#fff;box-shadow:0 4px 14px rgba(42,92,63,.3)}
.btn-sub{flex:1;padding:14px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--mid);letter-spacing:.06em;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:50px}
.inv-panel{display:none;padding:12px}
.inv-panel.open{display:block}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;background:var(--light);margin-bottom:10px;position:relative}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.inv-result-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.inv-result-row:last-child{border-bottom:none}
.inv-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.is-new{background:#e1f5ee;color:#0f6e56}
.is-update{background:#faeeda;color:#854f0b}
.is-same{background:#f1f1f1;color:#888}
.spinner{width:34px;height:34px;border:3px solid var(--gl);border-top-color:var(--gd);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.err-box{background:#fdf0ee;border:1px solid #e8b4a8;border-radius:9px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:8px;display:none}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,10px) + 8px);left:50%;transform:translateX(-50%);background:#2a5c3f;color:#fff;padding:10px 20px;border-radius:24px;font-family:"Shippori Mincho B1",serif;font-size:13px;letter-spacing:.1em;box-shadow:0 4px 16px rgba(0,0,0,.22);z-index:400;animation:fadeIn .25s ease;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div>
    <span class="top-shop">Café照</span>
    <div class="top-title">食材マスター</div>
  </div>
  <button class="cloud-btn" onclick="openGasSettings()">☁️ クラウド設定</button>
</div>

<div class="tab-bar">
  <button class="tab-btn on" id="tab-master" onclick="switchTab('master')">
    <span class="ico">🧂</span>食材マスター
  </button>
  <button class="tab-btn" id="tab-invoice" onclick="switchTab('invoice')">
    <span class="ico">📷</span>納品書取り込み
  </button>
</div>

<!-- 食材マスタータブ -->
<div id="pane-master">
  <div class="toolbar">
    <div class="search-row">
      <input class="search-inp" id="q" placeholder="食材名・業者名で検索..." oninput="render()">
      <button class="btn-add" onclick="addNew()">＋ 追加</button>
    </div>
    <div class="cat-scroll" id="cat-btns"></div>
  </div>
  <div class="count-bar">
    <span>表示中 <strong id="count">–</strong> 品目</span>
    <span style="font-size:10px;color:var(--mid)">タップで展開・編集</span>
  </div>
  <div id="ing-list"></div>
</div>

<!-- 納品書タブ -->
<div id="pane-invoice" class="inv-panel">
  <div style="padding:12px 0 10px">
    <div style="font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:700;margin-bottom:4px">📷 納品書から単価を取り込む</div>
    <div style="font-size:12px;color:var(--mid);line-height:1.8">紙の納品書を撮影するだけ。AIが商品名・単価を自動認識して食材マスターに上書き保存します。</div>
  </div>
  <div class="upload-zone" id="inv-drop"
    ondragover="event.preventDefault()"
    ondrop="handleDrop(event)">
    <div style="font-size:36px;margin-bottom:8px">📷</div>
    <div style="font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:700;margin-bottom:4px">今すぐ撮影 または 写真を選ぶ</div>
    <div style="font-size:11px;color:var(--mid)">JPG・PNG・PDF対応</div>
    <input type="file" accept="image/*,.pdf" capture="environment" id="inv-file" onchange="handleFile(event)">
  </div>
  <div id="inv-preview-wrap" style="display:none;margin-bottom:10px">
    <img id="inv-preview-img" style="width:100%;max-height:200px;object-fit:contain;border-radius:10px;border:1px solid var(--border)">
  </div>
  <div class="err-box" id="inv-err"></div>
  <button class="btn-main btn-m-green" id="inv-btn" onclick="analyzeInvoice()" disabled
    style="width:100%;margin-bottom:8px;opacity:.45;cursor:not-allowed">
    🤖 AIで読み取る
  </button>
  <div id="inv-loading" style="display:none;text-align:center;padding:20px">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--mid);font-family:'Shippori Mincho B1',serif">AIが解析中...</div>
  </div>
  <div id="inv-result-wrap" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:700">読み取り結果</div>
      <div id="inv-summary" style="font-size:11px;color:var(--mid)"></div>
    </div>
    <div style="background:var(--card);border-radius:12px;padding:10px 12px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px">
      <div style="display:grid;grid-template-columns:1fr 80px 50px 60px;gap:6px;padding:4px 0 6px;font-size:9px;font-weight:700;color:var(--mid);border-bottom:1px solid var(--border)">
        <span>食材名</span><span>単価</span><span>単位</span><span>状態</span>
      </div>
      <div id="inv-result-list"></div>
    </div>
    <button class="btn-main btn-m-green" onclick="applyInvoice()" style="width:100%;margin-bottom:8px">✅ 全て上書き保存</button>
    <button class="btn-sub" onclick="resetInvoice()" style="width:100%">← 撮り直す</button>
  </div>
</div>

</div>

<!-- ボトムバー（食材マスタータブのみ表示） -->
<div class="bottom-bar" id="bottom-bar">
  <button class="btn-main btn-m-green" onclick="saveAll()">💾 保存する</button>
  <button class="btn-sub" onclick="exportCSV()">📥 CSV</button>
  <button class="btn-sub" onclick="syncNow()">🔄 同期</button>
  <button class="btn-sub" onclick="restoreDefaults()" style="color:var(--red);border-color:var(--red);flex:0.8">↩ 復元</button>
</div>

// =============================================
// GAS / ローカルストレージ
// =============================================
let GAS_URL = localStorage.getItem('cafe_teru_gas') || '';
let _ings = null;

function load() {
  if (_ings) return _ings;
  try {
    const saved = JSON.parse(localStorage.getItem('cafe_teru_ings') || 'null');
    _ings = saved ? saved : JSON.parse(JSON.stringify(DEFAULT_INGS));
  } catch(e) {
    _ings = JSON.parse(JSON.stringify(DEFAULT_INGS));
  }
  return _ings;
}

async function saveAll() {
  _ings = load();
  localStorage.setItem('cafe_teru_ings', JSON.stringify(_ings));
  if (GAS_URL) {
    try {
      await fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'save', data: { ingredients: _ings } })
      });
    } catch(e) {}
  }
  showToast('✅ 保存しました');
}

async function syncNow() {
  if (!GAS_URL) { openGasSettings(); return; }
  showToast('🔄 同期中...');
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now(), { method: 'GET', mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();

    const gasIngs = json.ok && json.data && json.data.ingredients ? json.data.ingredients : [];

    if (gasIngs.length > 0) {
      // GASにデータあり → ローカルに反映
      _ings = gasIngs;
      localStorage.setItem('cafe_teru_ings', JSON.stringify(_ings));
      render();
      showToast('✅ ' + _ings.length + '品目を取得しました');
    } else {
      // GASが空 → ローカルのデータをGASに送る（消えないように）
      const local = load();
      if (local.length > 0) {
        fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'save', data: { ingredients: local } })
        });
        showToast('☁️ ' + local.length + '品目をGASに登録しました');
      } else {
        showToast('⚠️ データがありません');
      }
    }
  } catch(e) {
    showToast('⚠️ 同期失敗: ' + e.message);
  }
}

function openGasSettings() {
  const url = prompt('Google Apps ScriptのURLを入力してください\n（空欄でクリア）', GAS_URL || '');
  if (url === null) return;
  GAS_URL = url.trim();
  localStorage.setItem('cafe_teru_gas', GAS_URL);
  // GAS設定時は同期せず、手動で同期ボタンを押してもらう
  if (GAS_URL) { showToast('✅ 設定しました。「保存する」を押してGASにデータを送ってください'); }
  else showToast('クリアしました');
}

// データが消えた場合の緊急復元
function restoreDefaults() {
  if (!confirm('食材データを初期の191品目に戻しますか？\n※現在のデータは上書きされます')) return;
  _ings = JSON.parse(JSON.stringify(DEFAULT_INGS));
  localStorage.setItem('cafe_teru_ings', JSON.stringify(_ings));
  render();
  showToast('✅ 191品目を復元しました');
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

// =============================================
// タブ切替
// =============================================
function switchTab(name) {
  const isMaster = name === 'master';
  document.getElementById('pane-master').style.display = isMaster ? '' : 'none';
  const inv = document.getElementById('pane-invoice');
  inv.classList.toggle('open', !isMaster);
  document.getElementById('bottom-bar').style.display = isMaster ? '' : 'none';
  document.getElementById('tab-master').classList.toggle('on', isMaster);
  document.getElementById('tab-invoice').classList.toggle('on', !isMaster);
}

// =============================================
// カテゴリ
// =============================================
const CATS = ['すべて','肉類','魚介類','乳製品・飲料','調味料','油・粉類','野菜・加工品','醤油類','アクト','消耗品','その他'];
const CAT_CLS = {
  '肉類':'bc-meat','魚介類':'bc-drink','乳製品・飲料':'bc-dairy',
  '調味料':'bc-season','油・粉類':'bc-oil','野菜・加工品':'bc-veg',
  '醤油類':'bc-soy','アクト':'bc-akt','消耗品':'bc-dispose','その他':'bc-other'
};
let activeCat = 'すべて';

function initCats() {
  const wrap = document.getElementById('cat-btns');
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c === 'すべて' ? ' on' : '');
    b.textContent = c;
    b.addEventListener('click', function() {
      activeCat = c;
      document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('on'));
      this.classList.add('on');
      render();
    });
    wrap.appendChild(b);
  });
}

// =============================================
// レンダリング（IDは必ず data-id 属性で管理）
// =============================================
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const ings = load();
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  const filtered = ings.filter(i => {
    if (activeCat !== 'すべて' && i.category !== activeCat) return false;
    if (q && !i.name.toLowerCase().includes(q) && !(i.supplier||'').toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('count').textContent = filtered.length;
  const list = document.getElementById('ing-list');
  list.innerHTML = '';

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--mid);font-size:13px;line-height:2">該当する食材が見つかりません</div>';
    return;
  }

  filtered.forEach(ing => {
    const badgeCls = CAT_CLS[ing.category] || 'bc-other';
    const taxCls = ing.taxRate === 0.1 ? 'tax-10' : 'tax-8';
    const taxLbl = ing.taxRate === 0.1 ? '10%' : '8%';
    const catOpts = CATS.filter(c => c !== 'すべて')
      .map(c => '<option' + (c === ing.category ? ' selected' : '') + '>' + esc(c) + '</option>').join('');

    const card = document.createElement('div');
    card.className = 'ing-card';
    card.dataset.ingId = ing.id;

    // ヘッダー部分（タップで開閉）
    const head = document.createElement('div');
    head.className = 'ic-head';
    head.innerHTML =
      '<div class="ic-name">' + esc(ing.name) + '</div>' +
      '<div class="ic-badges">' +
        '<span class="badge ' + badgeCls + '">' + esc(ing.category || 'その他') + '</span>' +
        '<span class="' + taxCls + '">' + taxLbl + '</span>' +
        '<span class="chevron">›</span>' +
      '</div>';
    head.addEventListener('click', function() { toggleCard(card); });

    // 単価表示
    const price = document.createElement('div');
    price.className = 'ic-price';
    price.innerHTML =
      '<span class="price-val">¥' + ing.unitPrice.toLocaleString('ja-JP', {maximumFractionDigits:4}) + '</span>' +
      '<span class="price-unit">/ ' + esc(ing.unit) + '</span>' +
      '<span class="price-sup">' + esc(ing.supplier || '') + '</span>';

    // 編集フォーム
    const expand = document.createElement('div');
    expand.className = 'ic-expand';

    const form = document.createElement('div');
    form.className = 'edit-form';
    form.innerHTML =
      '<div class="ef-row"><span class="ef-lbl">食材名</span>' +
        '<input class="ef-inp" value="' + esc(ing.name) + '" data-field="name"></div>' +
      '<div class="ef-row"><span class="ef-lbl">業者</span>' +
        '<input class="ef-inp" value="' + esc(ing.supplier || '') + '" data-field="supplier"></div>' +
      '<div class="ef-row"><span class="ef-lbl">単価</span>' +
        '<input class="ef-inp" type="number" step="0.0001" value="' + ing.unitPrice + '" data-field="unitPrice" style="max-width:110px">' +
        '<span style="font-size:12px;color:var(--mid)">円 /</span>' +
        '<input class="ef-inp" value="' + esc(ing.unit) + '" data-field="unit" style="max-width:60px"></div>' +
      '<div class="ef-row"><span class="ef-lbl">カテゴリ</span>' +
        '<select class="ef-inp" data-field="category">' + catOpts + '</select></div>' +
      '<div class="ef-row"><span class="ef-lbl">税率</span>' +
        '<select class="ef-inp" data-field="taxRate" style="max-width:90px">' +
          '<option value="0.08"' + (ing.taxRate !== 0.1 ? ' selected' : '') + '>8%</option>' +
          '<option value="0.1"' + (ing.taxRate === 0.1 ? ' selected' : '') + '>10%</option>' +
        '</select></div>' +
      '<div class="ef-btns">' +
        '<button class="btn-ef btn-ef-green" data-action="save">💾 保存</button>' +
        '<button class="btn-ef btn-ef-red" data-action="delete">削除</button>' +
      '</div>';

    // イベント：保存・削除ボタン
    form.querySelector('[data-action="save"]').addEventListener('click', function() {
      saveCardEdit(card, ing.id);
    });
    form.querySelector('[data-action="delete"]').addEventListener('click', function() {
      deleteIng(ing.id);
    });

    expand.appendChild(form);
    card.appendChild(head);
    card.appendChild(price);
    card.appendChild(expand);
    list.appendChild(card);
  });
}

// カード開閉（onclick ではなく addEventListener で確実に動作）
function toggleCard(card) {
  const expand = card.querySelector('.ic-expand');
  const chevron = card.querySelector('.chevron');
  const isOpen = expand.classList.contains('open');

  // 他を全部閉じる
  document.querySelectorAll('.ic-expand.open').forEach(el => {
    el.classList.remove('open');
    const ch = el.closest('.ing-card').querySelector('.chevron');
    if (ch) { ch.textContent = '›'; ch.classList.remove('open'); }
  });

  if (!isOpen) {
    expand.classList.add('open');
    chevron.textContent = '∨';
    chevron.classList.add('open');
    setTimeout(() => expand.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

// カード内の編集を反映して保存
function saveCardEdit(card, ingId) {
  const ings = load();
  const ing = ings.find(i => i.id === ingId);
  if (!ing) return;

  const inputs = card.querySelectorAll('[data-field]');
  inputs.forEach(el => {
    const field = el.dataset.field;
    const val = el.value;
    if (field === 'unitPrice' || field === 'taxRate') {
      ing[field] = parseFloat(val) || 0;
    } else {
      ing[field] = val;
    }
  });
  saveAll();
}

function deleteIng(ingId) {
  if (!confirm('この食材を削除しますか？')) return;
  _ings = load().filter(i => i.id !== ingId);
  render();
  showToast('削除しました（保存ボタンで確定）');
}

function addNew() {
  const ings = load();
  // 新規IDは現在の最大ID+1
  const maxId = ings.reduce((m, i) => Math.max(m, i.id), 0);
  const newId = maxId + 1;
  ings.unshift({ id: newId, name: '', supplier: '', unitPrice: 0, unit: 'g', taxRate: 0.08, category: 'その他' });
  render();
  setTimeout(() => {
    const firstCard = document.querySelector('.ing-card');
    if (firstCard) {
      toggleCard(firstCard);
      const firstInp = firstCard.querySelector('.ef-inp');
      if (firstInp) firstInp.focus();
    }
  }, 50);
}

// =============================================
// CSV エクスポート
// =============================================
function exportCSV() {
  const ings = load();
  const rows = [['ID','食材名','業者','単価','単位','税率','カテゴリ']];
  ings.forEach(i => rows.push([i.id, i.name, i.supplier||'', i.unitPrice, i.unit, i.taxRate===0.08?'8%':'10%', i.category||'']));
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = '食材マスター_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('📥 CSVをダウンロードしました');
}

// =============================================
// 納品書 AI 読み取り
// =============================================
let invState = {};

function handleDrop(e) {
  e.preventDefault();
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
}
function handleFile(e) {
  if (e.target.files[0]) processFile(e.target.files[0]);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    invState = { b64: ev.target.result, mime: file.type || 'image/jpeg' };
    document.getElementById('inv-preview-img').src = ev.target.result;
    document.getElementById('inv-preview-wrap').style.display = '';
    const btn = document.getElementById('inv-btn');
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
    document.getElementById('inv-err').style.display = 'none';
    document.getElementById('inv-result-wrap').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyzeInvoice() {
  if (!invState.b64) return;
  const btn = document.getElementById('inv-btn');
  btn.disabled = true; btn.style.opacity = '.5';
  document.getElementById('inv-loading').style.display = '';
  document.getElementById('inv-result-wrap').style.display = 'none';
  document.getElementById('inv-err').style.display = 'none';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: invState.mime, data: invState.b64.split(',')[1] } },
          { type: 'text', text: 'この納品書から食材情報を全て抽出してください。JSONのみ返してください（前置き・コードブロック不要）:\n[{"name":"商品名","supplier":"業者名","unitPrice":1単位あたりの数値,"unit":"g or ml or 個 or 本 or 袋 or 尾","taxRate":0.08}]\n単価換算: 1kg=2000円→unitPrice:2,unit:"g" / 500ml=750円→unitPrice:1.5,unit:"ml"\n除外: 合計・送料・税額行。JSONのみ返すこと。' }
        ]}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content?.[0]?.text || '[]';
    const items = JSON.parse(raw.replace(/```json?/g,'').replace(/```/g,'').trim());
    invState.items = items;
    renderInvResult(items);
  } catch(e) {
    const err = document.getElementById('inv-err');
    err.textContent = '⚠️ 読み取りエラー: ' + e.message;
    err.style.display = '';
  } finally {
    btn.disabled = false; btn.style.opacity = '1';
    document.getElementById('inv-loading').style.display = 'none';
  }
}

function renderInvResult(items) {
  const ings = load();
  const UNIT_NORM = {'ｇ':'g','Ｇ':'g','㎖':'ml','ｍｌ':'ml','ｋｇ':'kg','㎏':'kg','KG':'kg'};
  let nc=0, uc=0, sc=0;
  const list = document.getElementById('inv-result-list');
  list.innerHTML = '';
  items.forEach(item => {
    item.unit = UNIT_NORM[item.unit] || item.unit || 'g';
    const ex = ings.find(i => i.name.replace(/\s/g,'') === item.name.replace(/\s/g,'') || i.name.includes(item.name) || item.name.includes(i.name));
    let st, sc2;
    if (!ex) { st='新規'; sc2='is-new'; nc++; }
    else if (Math.abs(ex.unitPrice - item.unitPrice) > 0.0001) { st='更新'; sc2='is-update'; uc++; }
    else { st='変更なし'; sc2='is-same'; sc++; }
    const row = document.createElement('div');
    row.className = 'inv-result-row';
    row.innerHTML =
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(item.name) + '</div>' +
      (ex && st==='更新' ? '<div style="font-size:10px;color:var(--mid);text-decoration:line-through">¥' + ex.unitPrice + '/' + esc(ex.unit||'g') + '</div>' : '') +
      '</div><div style="font-size:13px;font-weight:700;color:var(--gd);white-space:nowrap">¥' + item.unitPrice + '</div>' +
      '<div style="font-size:12px;color:var(--mid)">' + esc(item.unit) + '</div>' +
      '<span class="inv-status ' + sc2 + '">' + st + '</span>';
    list.appendChild(row);
  });
  document.getElementById('inv-summary').textContent = '新規 ' + nc + ' / 更新 ' + uc + ' / 変更なし ' + sc;
  document.getElementById('inv-result-wrap').style.display = '';
}

function applyInvoice() {
  const ings = load();
  (invState.items || []).forEach(item => {
    const idx = ings.findIndex(i => i.name.replace(/\s/g,'') === item.name.replace(/\s/g,'') || i.name.includes(item.name) || item.name.includes(i.name));
    if (idx >= 0) {
      ings[idx].unitPrice = item.unitPrice;
      ings[idx].unit = item.unit || ings[idx].unit;
      if (item.supplier) ings[idx].supplier = item.supplier;
    } else {
      const maxId = ings.reduce((m,i) => Math.max(m, i.id), 0);
      ings.push({ id: maxId+1, name: item.name, supplier: item.supplier||'', unitPrice: item.unitPrice, unit: item.unit||'g', taxRate: item.taxRate||0.08, category: 'その他' });
    }
  });
  saveAll();
  resetInvoice();
  switchTab('master');
  render();
  showToast('✅ 食材マスターを更新しました');
}

function resetInvoice() {
  invState = {};
  document.getElementById('inv-preview-wrap').style.display = 'none';
  document.getElementById('inv-result-wrap').style.display = 'none';
  const btn = document.getElementById('inv-btn');
  btn.disabled = true; btn.style.opacity = '.45'; btn.style.cursor = 'not-allowed';
  document.getElementById('inv-file').value = '';
}

// =============================================
// 初期化
// =============================================
document.addEventListener('DOMContentLoaded', function() {
  initCats();
  render();
  if (GAS_URL) syncNow();
});
